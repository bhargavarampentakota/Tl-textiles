// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("pub");
  const [user, setUser] = useState(null);
  const [data, setDataRaw] = useState(() => load("tl_data", SEED_DATA));
  const [visitor, setVisitorRaw] = useState(() => load("tl_visitor", DEFAULT_VISITOR));
  const [tab, setTab] = useState("overview");
  const [mob, setMob] = useState(false);
  const [lf, setLf] = useState({ email:"", pass:"", err:"" });

  const setData = v => { setDataRaw(v); save("tl_data", typeof v === "function" ? v(data) : v); };
  const updateData = fn => { setDataRaw(prev => { const next = fn(prev); save("tl_data", next); return next; }); };
  const setVisitor = v => { setVisitorRaw(v); save("tl_visitor", typeof v === "function" ? v(visitor) : v); };
  const updateVisitor = fn => { setVisitorRaw(prev => { const next = fn(prev); save("tl_visitor", next); return next; }); };

  const doLogin = () => {
    const u = USERS.find(x => x.email === lf.email && x.pass === lf.pass);
    if (u) { setUser(u); setScreen("dash"); setTab("overview"); }
    else setLf(f => ({ ...f, err: "Invalid email or password" }));
  };

  return (
    <>
      <style>{CSS}</style>
      {screen === "pub" && <PubSite vp={visitor} onLogin={() => setScreen("login")} />}
      {screen === "login" && <LoginPage lf={lf} setLf={setLf} onLogin={doLogin} onBack={() => setScreen("pub")} />}
      {screen === "dash" && <Dash user={user} data={data} updateData={updateData} visitor={visitor} updateVisitor={updateVisitor} tab={tab} setTab={setTab} mob={mob} setMob={setMob} onLogout={() => { setUser(null); setScreen("pub"); }} />}
    </>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dash({ user, data, updateData, visitor, updateVisitor, tab, setTab, mob, setMob, onLogout }) {
  const isMob = typeof window !== "undefined" && window.innerWidth < 768;
  const NAV = {
    admin: [["overview","Overview","home"],["locals","Manufacturer Deals","handshake"],["buyers","Buyers","users"],["orders","Orders","pkg"],["agents","Agents","tag"],["workers","Workers","users"],["payouts","Payouts","rupee"],["visitorpage","Visitor Page","globe"]],
    agent: [["overview","Overview","home"],["mylocals","My Manufacturer Deals","handshake"],["myorders","My Orders","pkg"],["myearnings","My Earnings","trend"]],
    worker: [["overview","Overview","home"],["orders","Orders","pkg"],["buyers","Buyers","users"]],
  };
  const nav = NAV[user.role] || NAV.admin;
  const RC = { admin:"#c9a84c", agent:"#22c55e", worker:"#3b82f6" };
  const label = nav.find(x => x[0]===tab)?.[1] || "Dashboard";

  const SB2 = ({ close }) => (
    <>
      <div style={{ marginBottom:20,paddingBottom:16,borderBottom:"1px solid #141210" }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:300,color:"#c9a84c",letterSpacing:".08em" }}><em>TL</em> Textiles</div>
        <div style={{ fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:".2em",textTransform:"uppercase",color:"#1a1010",marginTop:3 }}>Partner Portal</div>
      </div>
      <div style={{ flex:1 }}>
        {nav.map(([k,l,ic]) => (
          <div key={k} className={`ni${tab===k?" on":""}`} onClick={() => { setTab(k); close&&close(); }}>
            <G n={ic} s={13} />{l}
          </div>
        ))}
      </div>
      <div style={{ paddingTop:14,borderTop:"1px solid #141210",marginTop:"auto" }}>
        <div className="ni" onClick={onLogout}><G n="logout" s={13} />Logout</div>
      </div>
    </>
  );

  return (
    <div style={{ display:"flex",height:"100vh",background:"#080806",color:"#e8e0cc",overflow:"hidden" }}>
      {!isMob && <div style={{ width:210,borderRight:"1px solid #141210",padding:"18px 10px",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto" }}><SB2 /></div>}
      {isMob && mob && <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:40 }} onClick={() => setMob(false)} />}
      {isMob && <div style={{ position:"fixed",left:0,top:0,bottom:0,width:230,background:"#0a0908",borderRight:"1px solid #1a1810",zIndex:50,padding:"18px 10px",transform:mob?"translateX(0)":"translateX(-100%)",transition:"transform .3s",display:"flex",flexDirection:"column",overflowY:"auto" }}><SB2 close={() => setMob(false)} /></div>}

      <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden" }}>
        <div style={{ padding:"13px 20px",borderBottom:"1px solid #141210",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0 }}>
          <div style={{ display:"flex",alignItems:"center",gap:9 }}>
            {isMob && <button onClick={() => setMob(true)} style={{ background:"none",border:"none",color:"#c9a84c",cursor:"pointer",padding:3 }}><G n="menu" s={19} /></button>}
            <div>
              <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:400 }}>{label}</div>
              <div style={{ fontFamily:"'DM Mono',monospace",fontSize:7.5,letterSpacing:".16em",textTransform:"uppercase",color:"#2a2010",marginTop:2 }}>TL Textiles</div>
            </div>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:9 }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:12.5,color:"#c9a84c" }}>{user.name}</div>
              <div style={{ fontFamily:"'DM Mono',monospace",fontSize:7.5,letterSpacing:".14em",textTransform:"uppercase",color:RC[user.role],marginTop:2 }}>{user.role}</div>
            </div>
            <div style={{ width:32,height:32,borderRadius:"50%",background:`${RC[user.role]}18`,border:`1px solid ${RC[user.role]}40`,display:"flex",alignItems:"center",justifyContent:"center",color:RC[user.role],fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600 }}>{user.name[0]}</div>
          </div>

          {tab==="overview"    && <Overview user={user} data={data} />}
          {tab==="locals"      && <LocalsTab data={data} updateData={updateData} adminView />}
          {tab==="mylocals"    && <LocalsTab data={data} updateData={updateData} agentId={user.id} />}
          {tab==="buyers"      && <BuyersTab data={data} updateData={updateData} />}
          {(tab==="orders"||tab==="myorders") && <OrdersTab data={data} updateData={updateData} agentId={tab==="myorders"?user.id:null} />}
          {tab==="agents"      && <AgentsTab data={data} />}
          {tab==="workers"     && <WorkersTab data={data} />}
          {tab==="payouts"     && <PayoutsTab data={data} updateData={updateData} />}
          {tab==="myearnings"  && <MyEarnings user={user} data={data} />}
          {tab==="visitorpage" && <VisitorPageEditor visitor={visitor} updateVisitor={updateVisitor} />}
        </div>
      </div>
    </div>
  );
}

function Kpi({ l, v, s, c }) { return <div className="kpi"><div className="kl">{l}</div><div className="kv" style={{ color:c }}>{v}</div><div className="ks">{s}</div></div>; }

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function Overview({ user, data }) {
  const tv = data.orders.reduce((s,o) => s+o.salePrice, 0);
  const tp = data.orders.reduce((s,o) => s+o.profit, 0);
  const tc = data.orders.reduce((s,o) => s+o.commission, 0);
  const ao = data.orders.filter(o => o.stage!=="completed").length;

  if (user.role==="agent") {
    const ag = data.agents.find(a => a.id===user.id);
    const ml = data.locals.filter(l => l.agentId===user.id);
    const mo = data.orders.filter(o => o.agentId===user.id);
    return (<div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:20 }}>
        <Kpi l="Total Earned" v={fmt(ag?.totalEarned||0)} s="from manufacturers" c="#22c55e" />
        <Kpi l="Pending Payout" v={fmt(ag?.pendingPayout||0)} s="awaiting" c="#f59e0b" />
        <Kpi l="Manufacturer Deals" v={ml.length} s="logged" c="#c9a84c" />
        <Kpi l="My Orders" v={mo.length} s="total" c="#3b82f6" />
      </div>
      <div className="sh">My Recent Orders</div>
      {mo.slice(-4).reverse().map(o => { const b = data.buyers.find(x => x.id===o.buyerId); return (<div key={o.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"#0f0e0a",border:"1px solid #141210",marginBottom:4 }}><div><span style={{ fontSize:13 }}>{b?.name}</span><span style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#3a3020",marginLeft:9 }}>{o.date}</span></div><div style={{ display:"flex",gap:9,alignItems:"center" }}><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"#c9a84c" }}>{fmt(o.salePrice)}</span><span className="badge" style={{ background:SB(o.stage),color:SC(o.stage) }}>{o.stage}</span></div></div>); })}
    </div>);
  }

  return (<div>
    <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:22 }}>
      <Kpi l="Total Volume" v={fmt(tv)} s="all orders" c="#c9a84c" />
      <Kpi l="Total Profit" v={fmt(tp)} s="net margin" c="#22c55e" />
      <Kpi l="Commission Owed" v={fmt(tc)} s="to agents" c="#f59e0b" />
      <Kpi l="Active Orders" v={ao} s="in pipeline" c="#3b82f6" />
      <Kpi l="Manufacturers" v={data.locals.length} s="deals made" c="#a78bfa" />
      <Kpi l="Buyers" v={data.buyers.length} s="total" c="#06b6d4" />
    </div>
    <div className="sh">Active Pipeline</div>
    {data.orders.filter(o => o.stage!=="completed").map(o => { const b = data.buyers.find(x => x.id===o.buyerId); const l = data.locals.find(x => x.id===o.localId); return (<div key={o.id} style={{ background:"#0f0e0a",border:"1px solid #1a1810",padding:"11px 14px",marginBottom:7,display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:9,alignItems:"center" }}><div><div style={{ fontSize:13,marginBottom:2 }}>{o.product} × {o.qty?.toLocaleString()}</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#3a3020",textTransform:"uppercase",letterSpacing:".1em" }}>{b?.name} · {l?.businessName}</div></div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#f59e0b" }}>→ {STAGE_NEXT[o.stage]}</div><span className="badge" style={{ background:SB(o.stage),color:SC(o.stage) }}>{o.stage}</span></div>); })}
    <div className="sh" style={{ marginTop:20 }}>Recent Orders</div>
    {data.orders.slice(-4).reverse().map(o => { const b = data.buyers.find(x => x.id===o.buyerId); return (<div key={o.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"#0f0e0a",border:"1px solid #141210",marginBottom:4 }}><div><span style={{ fontSize:13 }}>{b?.name}</span><span style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#3a3020",marginLeft:9 }}>{o.date}</span></div><div style={{ display:"flex",gap:9,alignItems:"center" }}><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"#c9a84c" }}>{fmt(o.salePrice)}</span><span className="badge" style={{ background:SB(o.stage),color:SC(o.stage) }}>{o.stage}</span></div></div>); })}
  </div>);
}

// ── LOCALS ────────────────────────────────────────────────────────────────────
function LocalsTab({ data, updateData, adminView, agentId }) {
  const [show, setShow] = useState(false);
  const [sel, setSel] = useState(null);
  const [ft, setFt] = useState("pub");
  const blank = { businessName:"",ownerName:"",city:"",state:"Tamil Nadu",pincode:"",phone:"",email:"",gst:"",address:"",products:"",pricePerPiece:"",minOrder:"",dealDate:new Date().toISOString().split("T")[0],commissionPct:10,agentCode:"",bankName:"",accountNo:"",ifsc:"",notes:"" };
  const [form, setForm] = useState(blank);
  const locals = adminView ? data.locals : data.locals.filter(l => l.agentId===agentId);

  const doSave = () => {
    if (!form.businessName) return;
    updateData(d => ({ ...d, locals:[...d.locals,{ ...form,id:"l"+Date.now(),agentId:agentId||"admin",status:"active",totalOrdersPlaced:0,totalVolume:0,pricePerPiece:+form.pricePerPiece,minOrder:+form.minOrder,commissionPct:+form.commissionPct }] }));
    setShow(false); setForm(blank);
  };

  if (sel) return <LocalDetail local={sel} data={data} onBack={() => setSel(null)} />;

  return (<div>
    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
      <div className="sh" style={{ margin:0 }}>Manufacturer Deals ({locals.length})</div>
      <button className="btn-o" onClick={() => setShow(!show)}><G n="plus" s={11} />Log New Deal</button>
    </div>
    {show && <div className="card" style={{ marginBottom:18,borderColor:"#c9a84c25" }}>
      <div className="tab-row">
        {[["pub","Public Info"],["deal","Deal Terms"],["priv","Private / Banking"]].map(([k,l]) => <div key={k} className={`tab${ft===k?" on":""}`} onClick={() => setFt(k)}>{l}</div>)}
      </div>
      {ft==="pub" && <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:10 }}>
        {[["businessName","Business Name"],["ownerName","Owner Name"],["phone","Phone"],["email","Email"],["city","City"],["state","State"],["pincode","Pincode"],["gst","GST Number"]].map(([k,l]) => <div key={k}><label className="lbl">{l}</label><input className="inp" value={form[k]} onChange={e => setForm(f => ({ ...f,[k]:e.target.value }))} /></div>)}
        <div style={{ gridColumn:"1/-1" }}><label className="lbl">Full Address</label><input className="inp" value={form.address} onChange={e => setForm(f => ({ ...f,address:e.target.value }))} /></div>
      </div>}
      {ft==="deal" && <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10 }}>
        {[["products","Products / Categories"],["pricePerPiece","Price Per Piece (₹)"],["minOrder","Min Order Qty"],["dealDate","Deal Date"],["commissionPct","Commission % (they pay you)"],["agentCode","Your Agent Code"]].map(([k,l]) => <div key={k}><label className="lbl">{l}</label><input className="inp" value={form[k]} type={k==="dealDate"?"date":["pricePerPiece","minOrder","commissionPct"].includes(k)?"number":"text"} onChange={e => setForm(f => ({ ...f,[k]:e.target.value }))} /></div>)}
      </div>}
      {ft==="priv" && <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10 }}>
        {[["bankName","Bank Name"],["accountNo","Account Number"],["ifsc","IFSC Code"]].map(([k,l]) => <div key={k}><label className="lbl">{l}</label><input className="inp" value={form[k]} onChange={e => setForm(f => ({ ...f,[k]:e.target.value }))} /></div>)}
        <div style={{ gridColumn:"1/-1" }}><label className="lbl">Notes (private)</label><textarea className="inp" value={form.notes} onChange={e => setForm(f => ({ ...f,notes:e.target.value }))} /></div>
      </div>}
      <div style={{ marginTop:14,display:"flex",gap:9 }}><button className="btn-g" onClick={doSave}>Save Deal</button><button className="btn-o" onClick={() => setShow(false)}>Cancel</button></div>
    </div>}
    <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(265px,1fr))",gap:10 }}>
      {locals.map(l => (
        <div key={l.id} className="card" style={{ cursor:"pointer" }} onClick={() => setSel(l)}>
          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:11 }}>
            <div><div style={{ fontSize:15,marginBottom:2 }}>{l.businessName}</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#4a4030",textTransform:"uppercase",letterSpacing:".12em" }}>{l.city}, {l.state}</div></div>
            <span className="badge" style={{ background:SB(l.status),color:SC(l.status),height:"fit-content" }}>{l.status}</span>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10 }}>
            <div><div className="kl">Commission</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#c9a84c" }}>{l.commissionPct}%</div></div>
            <div><div className="kl">Price/pc</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:20 }}>{fmt(l.pricePerPiece)}</div></div>
            <div><div className="kl">Orders</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#22c55e" }}>{l.totalOrdersPlaced}</div></div>
          </div>
          <div style={{ display:"flex",justifyContent:"space-between",paddingTop:9,borderTop:"1px solid #1a1810" }}>
            <span style={{ fontFamily:"'DM Mono',monospace",fontSize:9,color:"#c9a84c",letterSpacing:".12em" }}>{l.agentCode}</span>
            <span style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#2a2010" }}>Deal: {l.dealDate}</span>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

    </>}

// ── BUYERS ────────────────────────────────────────────────────────────────────
function BuyersTab({ data, updateData }) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState({ name:"",type:"foreign",country:"",contact:"",email:"",phone:"",referCode:"",referredBy:"" });
  const doSave = () => {
    if (!form.name||!form.referCode) return;
    updateData(d => ({ ...d, buyers:[...d.buyers,{ ...form,id:"b"+Date.now(),totalOrders:0,totalSpend:0,discountEarned:0,status:"active" }] }));
    setShow(false); setForm({ name:"",type:"foreign",country:"",contact:"",email:"",phone:"",referCode:"",referredBy:"" });
  };
  return (<div>
    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
      <div className="sh" style={{ margin:0 }}>Buyers ({data.buyers.length})</div>
      <button className="btn-o" onClick={() => setShow(!show)}><G n="plus" s={11} />Add Buyer</button>
    </div>
    {show && <div className="card" style={{ marginBottom:16,borderColor:"#c9a84c25" }}>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10,marginBottom:12 }}>
        {[["name","Buyer / Company Name"],["contact","Contact Person"],["email","Email"],["phone","Phone"],["country","Country"]].map(([k,l]) => <div key={k}><label className="lbl">{l}</label><input className="inp" value={form[k]} onChange={e => setForm(f => ({ ...f,[k]:e.target.value }))} /></div>)}
        <div><label className="lbl">Their Referral Code Word</label><input className="inp" value={form.referCode} onChange={e => setForm(f => ({ ...f,referCode:e.target.value }))} placeholder="e.g. BABU" /></div>
        <div><label className="lbl">Type</label><select className="inp" value={form.type} onChange={e => setForm(f => ({ ...f,type:e.target.value }))} style={{ cursor:"pointer" }}><option value="foreign">Foreign</option><option value="local">Local</option></select></div>
        <div><label className="lbl">Referred By (who sent them)</label><select className="inp" value={form.referredBy} onChange={e => setForm(f => ({ ...f,referredBy:e.target.value }))} style={{ cursor:"pointer" }}><option value="">— None —</option>{data.buyers.map(b => <option key={b.id} value={b.id}>{b.name} ({b.referCode})</option>)}</select></div>
      </div>
      <div style={{ display:"flex",gap:9 }}><button className="btn-g" onClick={doSave}>Save Buyer</button><button className="btn-o" onClick={() => setShow(false)}>Cancel</button></div>
    </div>}
    <div style={{ overflowX:"auto" }}>
      <div className="th" style={{ gridTemplateColumns:"1.5fr .6fr .9fr 1.1fr .9fr .9fr .7fr" }}><span>Buyer</span><span>Type</span><span>Ref Code</span><span>Referred By</span><span>Total Spend</span><span>Discount Earned</span><span>Status</span></div>
      {data.buyers.map(b => { const rb = data.buyers.find(x => x.id===b.referredBy); return (<div key={b.id} className="tr" style={{ gridTemplateColumns:"1.5fr .6fr .9fr 1.1fr .9fr .9fr .7fr" }}><div><div style={{ fontSize:13.5 }}>{b.name}</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#3a3020",marginTop:2 }}>{b.contact} · {b.country}</div></div><span className="badge" style={{ background:b.type==="foreign"?"#0c1a2e":"#1a1810",color:b.type==="foreign"?"#06b6d4":"#a09070" }}>{b.type}</span><span style={{ fontFamily:"'DM Mono',monospace",fontSize:11,color:"#c9a84c",letterSpacing:".12em" }}>{b.referCode}</span><span style={{ fontSize:12,color:"#6a5e4a" }}>{rb?`${rb.name} (${rb.referCode})`:"—"}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16 }}>{fmt(b.totalSpend)}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:b.discountEarned>0?"#22c55e":"#2a2010" }}>{b.discountEarned>0?`${b.discountEarned}% next`:"—"}</span><span className="badge" style={{ background:SB(b.status),color:SC(b.status) }}>{b.status}</span></div>); })}
    </div>
  </div>);
}

// ── ORDERS ────────────────────────────────────────────────────────────────────
function OrdersTab({ data, updateData, agentId }) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState({ localId:"",buyerId:"",product:"",qty:"",pricePerPiece:"",salePrice:"",referCode:"",buyerDiscount:"0",stage:"negotiation" });
  const orders = agentId ? data.orders.filter(o => o.agentId===agentId) : data.orders;

  const doSave = () => {
    if (!form.localId||!form.buyerId||!form.qty||!form.salePrice) return;
    const local = data.locals.find(l => l.id===form.localId);
    const qty=+form.qty, ppp=+form.pricePerPiece||(local?.pricePerPiece||0), sale=+form.salePrice;
    const cost=qty*ppp, profit=sale-cost, commission=Math.round(profit*(local?.commissionPct||10)/100);
    updateData(d => ({ ...d, orders:[...d.orders,{ ...form,id:"o"+Date.now(),agentId:local?.agentId||"",qty,pricePerPiece:ppp,totalCost:cost,salePrice:sale,profit,commission,buyerDiscount:+form.buyerDiscount,date:new Date().toISOString().split("T")[0],invoiceNo:"TL-2026-"+String(d.orders.length+1).padStart(3,"0") }] }));
    setShow(false); setForm({ localId:"",buyerId:"",product:"",qty:"",pricePerPiece:"",salePrice:"",referCode:"",buyerDiscount:"0",stage:"negotiation" });
  };

  const upStage = (id, stage) => updateData(d => ({ ...d, orders:d.orders.map(o => o.id===id?{ ...o,stage }:o) }));

  const local = data.locals.find(l => l.id===form.localId);
  const cost = local&&form.qty&&form.pricePerPiece ? +form.qty*(+form.pricePerPiece) : local&&form.qty ? +form.qty*local.pricePerPiece : null;
  const profit = cost&&form.salePrice ? +form.salePrice-cost : null;
  const comm = profit!=null&&local ? Math.round(profit*(local.commissionPct||10)/100) : null;

  return (<div>
    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
      <div className="sh" style={{ margin:0 }}>Orders ({orders.length})</div>
      {!agentId && <button className="btn-o" onClick={() => setShow(!show)}><G n="plus" s={11} />New Order</button>}
    </div>
    {show && <div className="card" style={{ marginBottom:16,borderColor:"#c9a84c25" }}>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10,marginBottom:12 }}>
        <div><label className="lbl">Manufacturer</label><select className="inp" value={form.localId} onChange={e => setForm(f => ({ ...f,localId:e.target.value }))} style={{ cursor:"pointer" }}><option value="">— Select —</option>{data.locals.map(l => <option key={l.id} value={l.id}>{l.businessName}</option>)}</select></div>
        <div><label className="lbl">Buyer</label><select className="inp" value={form.buyerId} onChange={e => setForm(f => ({ ...f,buyerId:e.target.value }))} style={{ cursor:"pointer" }}><option value="">— Select —</option>{data.buyers.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}</select></div>
        {[["product","Product Description"],["qty","Quantity (pcs)"],["pricePerPiece","Buy Price/pc (₹)"],["salePrice","Total Sale Price (₹)"],["referCode","Buyer's Ref Code Mentioned"],["buyerDiscount","Discount Applied to Buyer (%)"]].map(([k,l]) => <div key={k}><label className="lbl">{l}</label><input className="inp" type={["qty","pricePerPiece","salePrice","buyerDiscount"].includes(k)?"number":"text"} value={form[k]} onChange={e => setForm(f => ({ ...f,[k]:e.target.value }))} /></div>)}
        <div><label className="lbl">Stage</label><select className="inp" value={form.stage} onChange={e => setForm(f => ({ ...f,stage:e.target.value }))} style={{ cursor:"pointer" }}>{["negotiation","production","active","shipping","completed"].map(s => <option key={s} value={s}>{s}</option>)}</select></div>
      </div>
      {cost!=null && profit!=null && <div style={{ background:"#141210",border:"1px solid #2a2410",padding:"11px 14px",marginBottom:12,display:"flex",gap:22,flexWrap:"wrap" }}>
        <div><div className="kl">Buy Cost</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:18 }}>{fmt(cost)}</div></div>
        <div><div className="kl">Profit</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#22c55e" }}>{fmt(profit)}</div></div>
        <div><div className="kl">Commission Owed</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#f59e0b" }}>{fmt(comm)}</div></div>
      </div>}
      <div style={{ display:"flex",gap:9 }}><button className="btn-g" onClick={doSave}>Save Order</button><button className="btn-o" onClick={() => setShow(false)}>Cancel</button></div>
    </div>}
    <div style={{ display:"flex",flexDirection:"column",gap:9 }}>
      {orders.map(o => { const b=data.buyers.find(x=>x.id===o.buyerId); const l=data.locals.find(x=>x.id===o.localId); return (<div key={o.id} className="card">
        <div style={{ display:"grid",gridTemplateColumns:"1fr auto",gap:9,marginBottom:10 }}>
          <div><div style={{ fontSize:15,marginBottom:2 }}>{o.product} <span style={{ color:"#4a4030",fontSize:12 }}>× {o.qty?.toLocaleString()} pcs</span></div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#3a3020",textTransform:"uppercase",letterSpacing:".1em" }}>{b?.name} · via {l?.businessName}</div></div>
          <select value={o.stage} onChange={e => upStage(o.id,e.target.value)} style={{ background:SB(o.stage),border:"none",color:SC(o.stage),fontFamily:"'DM Mono',monospace",fontSize:8.5,letterSpacing:".1em",textTransform:"uppercase",padding:"4px 8px",cursor:"pointer",height:"fit-content" }}>{["negotiation","production","active","shipping","completed"].map(s => <option key={s} value={s}>{s}</option>)}</select>
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:7,paddingTop:9,borderTop:"1px solid #141210" }}>
          <div><div className="kl">Sale Price</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"#c9a84c" }}>{fmt(o.salePrice)}</div></div>
          <div><div className="kl">Profit</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"#22c55e" }}>{fmt(o.profit)}</div></div>
          <div><div className="kl">Commission</div><div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"#f59e0b" }}>{fmt(o.commission)}</div></div>
          <div><div className="kl">Buyer Ref Code</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:10,color:"#c9a84c" }}>{o.referCode||"—"}</div></div>
          <div><div className="kl">Discount</div><div style={{ fontSize:13,color:o.buyerDiscount>0?"#22c55e":"#2a2010" }}>{o.buyerDiscount>0?`${o.buyerDiscount}%`:"—"}</div></div>
          <div><div className="kl">Invoice</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:9,color:"#3a3020" }}>{o.invoiceNo}</div></div>
        </div>
        {o.stage!=="completed" && <div style={{ marginTop:9,paddingTop:9,borderTop:"1px solid #141210",fontFamily:"'DM Mono',monospace",fontSize:9,color:"#f59e0b" }}>→ {STAGE_NEXT[o.stage]}</div>}
      </div>); })}
    </div>
  </div>);
}

// ── AGENTS / WORKERS / PAYOUTS ────────────────────────────────────────────────
function AgentsTab({ data }) {
  return (<div>
    <div className="sh">Agents ({data.agents.length})</div>
    <div className="th" style={{ gridTemplateColumns:"1.5fr 1fr 1fr 1fr 1fr" }}><span>Agent</span><span>Code</span><span>Manufacturer Deals</span><span>Total Earned</span><span>Pending</span></div>
    {data.agents.map(a => { const ml=data.locals.filter(l=>l.agentId===a.id); return (<div key={a.id} className="tr" style={{ gridTemplateColumns:"1.5fr 1fr 1fr 1fr 1fr" }}><div><div style={{ fontSize:13.5 }}>{a.name}</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,color:"#3a3020",marginTop:2 }}>{a.region}</div></div><span style={{ fontFamily:"'DM Mono',monospace",fontSize:11,color:"#c9a84c",letterSpacing:".12em" }}>{a.code}</span><span>{ml.length}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#22c55e" }}>{fmt(a.totalEarned)}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#f59e0b" }}>{fmt(a.pendingPayout)}</span></div>); })}
  </div>);
}

function WorkersTab({ data }) {
  return (<div>
    <div className="sh">Workers ({data.workers.length})</div>
    <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10 }}>
      {data.workers.map(w => <div key={w.id} className="card"><div style={{ fontSize:15,marginBottom:3 }}>{w.name}</div><div style={{ fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#4a4030",textTransform:"uppercase",letterSpacing:".12em" }}>{w.role}</div></div>)}
    </div>
  </div>);
}

function PayoutsTab({ data, updateData }) {
  const pending = data.agents.filter(a => a.pendingPayout>0);
  const markPaid = id => updateData(d => ({ ...d, agents:d.agents.map(a => a.id===id?{ ...a,pendingPayout:0 }:a) }));
  return (<div>
    <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:20 }}>
      <Kpi l="Total Pending" v={fmt(pending.reduce((s,a)=>s+a.pendingPayout,0))} s="owed to agents" c="#f59e0b" />
      <Kpi l="Agents Awaiting" v={pending.length} s="payout due" c="#ef4444" />
      <Kpi l="Total Settled" v={fmt(data.agents.reduce((s,a)=>s+a.totalEarned-a.pendingPayout,0))} s="all time" c="#22c55e" />
    </div>
    <div className="sh">Pending Payouts</div>
    <div className="th" style={{ gridTemplateColumns:"1.5fr 1fr 1fr 1fr auto" }}><span>Agent</span><span>Code</span><span>Phone</span><span>Amount</span><span></span></div>
    {pending.map(a => (<div key={a.id} className="tr" style={{ gridTemplateColumns:"1.5fr 1fr 1fr 1fr auto" }}><span>{a.name}</span><span style={{ fontFamily:"'DM Mono',monospace",fontSize:11,color:"#c9a84c" }}>{a.code}</span><span style={{ fontSize:12,color:"#6a5e4a" }}>{a.phone}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#f59e0b" }}>{fmt(a.pendingPayout)}</span><button className="btn-g" style={{ fontSize:8.5,padding:"5px 12px" }} onClick={() => markPaid(a.id)}>Mark Paid</button></div>))}
    {!pending.length && <div style={{ color:"#2a2010",fontFamily:"'DM Mono',monospace",fontSize:9.5,padding:14 }}>All payouts settled.</div>}
  </div>);
}

function MyEarnings({ user, data }) {
  const ag = data.agents.find(a => a.id===user.id);
  const mo = data.orders.filter(o => o.agentId===user.id);
  if (!ag) return null;
  return (<div>
    <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:20 }}>
      <Kpi l="Total Earned" v={fmt(ag.totalEarned)} s="from manufacturers" c="#22c55e" />
      <Kpi l="Pending" v={fmt(ag.pendingPayout)} s="awaiting payout" c="#f59e0b" />
      <Kpi l="Settled" v={fmt(ag.totalEarned-ag.pendingPayout)} s="received" c="#3b82f6" />
      <Kpi l="Orders" v={mo.length} s="through my manufacturers" c="#c9a84c" />
    </div>
    <div style={{ background:"#0f0e0a",border:"1px solid #1a1810",padding:"16px 18px",marginBottom:20 }}>
      <div className="lbl" style={{ marginBottom:8 }}>How Your Earnings Work</div>
      <p style={{ fontSize:13.5,color:"#5a5040",lineHeight:1.85 }}>You make a deal with a local manufacturer: <em style={{ color:"#c9a84c" }}>"If buyers come through my code, you pay me {ag.commissionPct||10}% of your profit."</em> TL Textiles records every order placed through your manufacturers. Once the manufacturer receives payment, you get your commission.</p>
    </div>
    <div className="sh">Commission Breakdown</div>
    <div className="th" style={{ gridTemplateColumns:"1.5fr 1fr 1fr 1fr 1fr" }}><span>Buyer</span><span>Product</span><span>Manufacturer Profit</span><span>Your Commission</span><span>Stage</span></div>
    {mo.map(o => { const b=data.buyers.find(x=>x.id===o.buyerId); return (<div key={o.id} className="tr" style={{ gridTemplateColumns:"1.5fr 1fr 1fr 1fr 1fr" }}><span>{b?.name}</span><span style={{ color:"#6a5e4a" }}>{o.product}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16 }}>{fmt(o.profit)}</span><span style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#f59e0b" }}>{fmt(o.commission)}</span><span className="badge" style={{ background:SB(o.stage),color:SC(o.stage) }}>{o.stage}</span></div>); })}
  </div>);
}

// ── VISITOR PAGE EDITOR ───────────────────────────────────────────────────────
function VisitorPageEditor({ visitor, updateVisitor }) {
  const [saved, setSaved] = useState(false);
  const set = (k, v) => updateVisitor(p => ({ ...p, [k]:v }));
  const showSaved = () => { setSaved(true); setTimeout(() => setSaved(false), 2000); };

  const Field = ({ label, k, long }) => (
    <div className="vp-row">
      <div className="vp-key">{label}</div>
      <div className="vp-val">
        {long
          ? <textarea className="inp" style={{ margin:"4px 0",minHeight:56 }} value={visitor[k]||""} onChange={e => set(k, e.target.value)} />
          : <input className="inp" style={{ margin:"4px 0" }} value={visitor[k]||""} onChange={e => set(k, e.target.value)} />
        }
      </div>
    </div>
  );

  const Toggle = ({ label, k }) => (
    <div className="vp-row" style={{ alignItems:"center" }}>
      <div className="vp-key">{label}</div>
      <div className="vp-val" style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 10px" }}>
        <button className="tog" style={{ background:visitor[k]?"#c9a84c":"#2a2010" }} onClick={() => set(k, !visitor[k])}>
          <span style={{ position:"absolute",width:16,height:16,borderRadius:"50%",background:"#fff",top:3,left:visitor[k]?20:3,transition:"left .2s" }} />
        </button>
        <span style={{ fontFamily:"'DM Mono',monospace",fontSize:9,color:visitor[k]?"#c9a84c":"#3a3020",letterSpacing:".12em",textTransform:"uppercase" }}>{visitor[k]?"On":"Off"}</span>
      </div>
    </div>
  );

  return (<div>
    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
      <div className="sh" style={{ margin:0 }}>Visitor Page Content</div>
      <button className="btn-g" style={{ display:"flex",alignItems:"center",gap:6 }} onClick={showSaved}>
        <G n="save2" s={13} />{saved?"Saved ✓":"Save Changes"}
      </button>
    </div>
    <p style={{ fontFamily:"'DM Mono',monospace",fontSize:9,color:"#4a4030",marginBottom:20,lineHeight:1.7,letterSpacing:".06em" }}>
      Edit the text visitors see on the public website. Changes save instantly and persist — even after refresh.
    </p>

    {/* HERO */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>Hero Section</div>
      <div style={{ border:"1px solid #1a1810" }}>
        <Field label="Main Heading" k="heroTitle" />
        <Field label="Italic Heading" k="heroTitleItalic" />
        <Field label="Subtitle Text" k="heroSubtitle" long />
      </div>
    </div>

    {/* REGISTRATION BANNER */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>Registration Banner</div>
      <div style={{ border:"1px solid #1a1810" }}>
        <Toggle label="Show Banner" k="showRegistrationBanner" />
        <Field label="Banner Text" k="registrationNotice" />
      </div>
    </div>

    {/* STATS */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>Stats Bar (4 numbers)</div>
      <div style={{ border:"1px solid #1a1810" }}>
        {[["Stat 1 Number","stat1Val"],["Stat 1 Label","stat1Label"],["Stat 2 Number","stat2Val"],["Stat 2 Label","stat2Label"],["Stat 3 Number","stat3Val"],["Stat 3 Label","stat3Label"],["Stat 4 Number","stat4Val"],["Stat 4 Label","stat4Label"]].map(([l,k]) => <Field key={k} label={l} k={k} />)}
      </div>
    </div>

    {/* HOW IT WORKS */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>How It Works (4 cards)</div>
      <div style={{ border:"1px solid #1a1810" }}>
        {[["Card 1 Title","how1Title"],["Card 1 Text","how1Desc"],["Card 2 Title","how2Title"],["Card 2 Text","how2Desc"],["Card 3 Title","how3Title"],["Card 3 Text","how3Desc"],["Card 4 Title","how4Title"],["Card 4 Text","how4Desc"]].map(([l,k]) => <Field key={k} label={l} k={k} long={k.includes("Desc")} />)}
      </div>
    </div>

    {/* BECOME AN AGENT */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>Become an Agent Section</div>
      <div style={{ border:"1px solid #1a1810" }}>
        {[["Heading","agentCTATitle"],["Description","agentCTADesc"],["Button Text","agentCTAButton"]].map(([l,k]) => <Field key={k} label={l} k={k} long={k==="agentCTADesc"} />)}
      </div>
    </div>

    {/* CONTACT */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>Contact Details</div>
      <div style={{ border:"1px solid #1a1810" }}>
        {[["Email","contactEmail"],["Phone","contactPhone"],["Location","contactLocation"]].map(([l,k]) => <Field key={k} label={l} k={k} />)}
      </div>
    </div>

    {/* FOOTER */}
    <div style={{ marginBottom:16 }}>
      <div style={{ fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:".2em",textTransform:"uppercase",color:"#c9a84c",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1810" }}>Footer</div>
      <div style={{ border:"1px solid #1a1810" }}>
        <Field label="Footer Tagline" k="footerText" />
      </div>
    </div>

    <div style={{ display:"flex",justifyContent:"flex-end",marginTop:8 }}>
      <button className="btn-g" style={{ display:"flex",alignItems:"center",gap:6 }} onClick={showSaved}>
        <G n="save2" s={13} />{saved?"Saved ✓":"Save Changes"}
      </button>
    </div>
  </div>);
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
